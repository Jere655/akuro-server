<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Banque - Akuro RP</title>
</head>
<body>

<h1>🏦 Banque Akuro</h1>

<h2>🔐 Connexion</h2>

<input id="username" placeholder="Pseudo Minecraft">
<input id="password" type="password" placeholder="Mot de passe">

<br><br>

<button onclick="register()">Créer un compte</button>
<button onclick="login()">Se connecter</button>

<hr>

<h2>💰 Compte</h2>

<p id="balance">Solde : ?</p>

<button onclick="buy()">Acheter (-100)</button>

<h3>📜 Transactions</h3>
<ul id="transactions"></ul>

<script>

const API = "https://akuro-server.onrender.com";

let token = "";

// 🔐 REGISTER
async function register() {
  const name = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, password: pass })
  });

  alert("Compte créé !");
}

// 🔐 LOGIN
async function login() {
  const name = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ name, password: pass })
  });

  const data = await res.json();

  if (data.error) {
    alert(data.error);
    return;
  }

  token = data.token;

  loadAccount();
}

// 👤 LOAD COMPTE
async function loadAccount() {
  const res = await fetch(API + "/me", {
    headers: { Authorization: token }
  });

  const data = await res.json();

  document.getElementById("balance").innerText = "Solde : " + data.balance;

  const list = document.getElementById("transactions");
  list.innerHTML = "";

  data.transactions.forEach(t => {
    const li = document.createElement("li");
    li.innerText = t.action + " : " + t.amount;
    list.appendChild(li);
  });
}

// 💰 ACHAT
async function buy() {
  await fetch(API + "/transaction", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      action: "Achat site",
      amount: -100
    })
  });

  loadAccount();
}

</script>

</body>
</html>
